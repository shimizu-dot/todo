<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{admin.weeklyReportDetail.pageTitle}">週次レポート詳細</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0" th:text="#{admin.weeklyReportDetail.heading}">週次レポート詳細</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/weekly-reports}" class="btn btn-outline-secondary" th:text="#{common.backToList}">一覧へ戻る</a>
            <a th:href="@{/todo}" class="btn btn-outline-secondary" th:text="#{common.backToTodoList}">ToDo一覧へ戻る</a>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-3">
                    <div class="border rounded p-3 bg-white">
                        <div class="small text-muted" th:text="#{admin.weeklyReportDetail.week}">対象週</div>
                        <div class="fw-semibold"
                             th:text="${#temporals.format(report.weekStart, 'yyyy-MM-dd') + ' ~ ' + #temporals.format(report.weekEnd, 'yyyy-MM-dd')}">
                            2026-04-20 ~ 2026-04-26
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <div class="border rounded p-3 bg-white">
                        <div class="small text-muted" th:text="#{admin.weeklyReportDetail.createdCount}">作成数</div>
                        <div class="fw-semibold" th:text="${report.createdCount}">0</div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <div class="border rounded p-3 bg-white">
                        <div class="small text-muted" th:text="#{admin.weeklyReportDetail.completedCount}">完了数</div>
                        <div class="fw-semibold" th:text="${report.completedCount}">0</div>
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <div class="border rounded p-3 bg-white">
                        <div class="small text-muted" th:text="#{admin.weeklyReportDetail.completionRate}">完了率</div>
                        <div class="fw-semibold" th:text="${report.completionRate + '%'}">0%</div>
                    </div>
                </div>
            </div>
            <div class="small text-muted mt-3"
                 th:text="#{admin.weeklyReportDetail.generatedAt(${#temporals.format(report.generatedAt, 'yyyy-MM-dd HH:mm:ss')})}">
                生成日時: 2026-04-28 09:00:00
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3" th:text="#{admin.weeklyReportDetail.categoryBreakdown}">カテゴリ別内訳</h2>
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th th:text="#{todo.table.category}">カテゴリ</th>
                        <th th:text="#{common.count}">件数</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(categoryBreakdown)}">
                        <td colspan="2" class="text-center text-muted" th:text="#{admin.weeklyReportDetail.categoryBreakdown.empty}">カテゴリ別データはありません</td>
                    </tr>
                    <tr th:each="item : ${categoryBreakdown}">
                        <td>
                            <span class="badge me-2"
                                  th:style="'background-color:' + ${item.categoryColor} + ';color:#fff;'">&nbsp;</span>
                            <span th:text="${item.categoryName}">仕事</span>
                        </td>
                        <td th:text="${item.taskCount}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
