<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{admin.users.title}">ユーザー管理</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0" th:text="#{admin.users.title}">ユーザー管理</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/users(lang='ja')}" class="btn btn-outline-secondary btn-sm" th:text="#{lang.ja}">日本語</a>
            <a th:href="@{/admin/users(lang='en')}" class="btn btn-outline-secondary btn-sm" th:text="#{lang.en}">English</a>
            <a th:href="@{/admin/audit-logs}" class="btn btn-outline-secondary" th:text="#{admin.audit.title}">監査ログ</a>
            <a th:href="@{/admin/weekly-reports}" class="btn btn-outline-secondary" th:text="#{admin.weeklyReports.title}">週次レポート</a>
            <a th:href="@{/todo}" class="btn btn-outline-secondary" th:text="#{admin.users.back.todo}">ToDo一覧へ戻る</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5 mb-3" th:text="#{admin.users.new}">新規ユーザー登録</h2>
            <form th:action="@{/admin/users}" method="post" class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                    <label for="username" class="form-label" th:text="#{login.username}">ユーザー名</label>
                    <input id="username" name="username" type="text" class="form-control" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="password" class="form-label" th:text="#{login.password}">パスワード</label>
                    <input id="password" name="password" type="password" class="form-control" required>
                </div>
                <div class="col-12 col-md-2">
                    <label for="role" class="form-label" th:text="#{admin.users.role}">ロール</label>
                    <select id="role" name="role" class="form-select">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="col-12 col-md-2">
                    <button type="submit" class="btn btn-primary w-100" th:text="#{common.create}">登録</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th th:text="#{common.id}">ID</th>
                        <th th:text="#{admin.users.username}">ユーザー名</th>
                        <th th:text="#{admin.users.role}">ロール</th>
                        <th th:text="#{admin.users.enabled}">有効</th>
                        <th th:text="#{admin.users.passwordReset}">パスワードリセット</th>
                        <th class="text-center" th:text="#{common.update}">更新</th>
                        <th class="text-center" th:text="#{common.delete}">削除</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td>
                            <span th:text="${user.username}">admin</span>
                            <span class="badge text-bg-primary ms-2"
                                  th:if="${#authentication != null and #authentication.name == user.username}"
                                  th:text="#{admin.users.me}">自分</span>
                        </td>
                        <td>
                            <form th:id="'update-user-' + ${user.id}"
                                  th:action="@{/admin/users/{id}/update(id=${user.id})}"
                                  method="post"></form>
                            <select name="role" class="form-select form-select-sm" style="max-width: 140px;"
                                    th:form="'update-user-' + ${user.id}">
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                                <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                            </select>
                        </td>
                        <td>
                            <input type="hidden" name="enabled" value="false" th:form="'update-user-' + ${user.id}">
                            <div class="form-check form-switch">
                                <input class="form-check-input"
                                       th:id="'enabled-' + ${user.id}"
                                       type="checkbox"
                                       name="enabled"
                                       value="true"
                                       th:checked="${user.enabled != null and user.enabled}"
                                       th:form="'update-user-' + ${user.id}">
                                <label class="form-check-label" th:for="'enabled-' + ${user.id}">
                                    <span th:text="${user.enabled != null and user.enabled} ? #{common.enabled} : #{common.disabled}">有効</span>
                                </label>
                            </div>
                        </td>
                        <td>
                            <input type="password"
                                   name="newPassword"
                                   class="form-control form-control-sm"
                                   th:placeholder="#{admin.users.passwordReset.placeholder}"
                                   style="min-width: 180px;"
                                   th:form="'update-user-' + ${user.id}">
                        </td>
                        <td class="text-center">
                            <button type="submit"
                                    class="btn btn-sm btn-primary"
                                    th:form="'update-user-' + ${user.id}"
                                    th:text="#{common.save}">保存</button>
                        </td>
                        <td class="text-center">
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                  method="post"
                                  class="d-inline"
                                  onsubmit="return confirm(this.dataset.confirm);"
                                  th:attr="data-confirm=#{admin.users.delete.confirm}">
                                <button type="submit"
                                        class="btn btn-sm btn-danger"
                                        th:disabled="${#authentication != null and #authentication.name == user.username}"
                                        th:text="#{common.delete}">削除</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
