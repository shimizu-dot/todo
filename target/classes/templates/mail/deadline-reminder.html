<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<body>
<h2>ToDo期限リマインダー</h2>
<p><span th:text="${baseDate}">2026-04-28</span> 時点で期限超過または期限当日のToDoがあります。</p>
<p>対象件数: <strong th:text="${count}">0</strong>件</p>

<table border="1" cellpadding="6" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>タイトル</th>
        <th>期限日</th>
        <th>作成者</th>
        <th>完了</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}">1</td>
        <td th:text="${todo.title}">タイトル</td>
        <td th:text="${todo.deadline}">2026-04-28</td>
        <td th:text="${todo.author}">user@example.com</td>
        <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
    </tr>
    </tbody>
</table>

<p>CSVを添付しています。必要に応じて確認してください。</p>
</body>
</html>
