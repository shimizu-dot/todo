<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{error.500.title}">500 Internal Server Error</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3" th:text="#{error.500.heading}">500 - サーバーエラー</h1>
                    <p class="text-muted mb-3" th:text="${message} ?: #{error.500.fallback}">予期しないエラーが発生しました。</p>
                    <p class="small text-muted mb-4">
                        <span th:text="#{error.path.enLabel}">Path:</span> <span th:text="${path} ?: '-'">/todo</span>
                    </p>
                    <div class="d-flex gap-2">
                        <a th:href="@{/todo}" class="btn btn-primary" th:text="#{error.back.todo}">ToDo一覧へ戻る</a>
                        <a th:href="@{/login}" class="btn btn-outline-secondary" th:text="#{error.back.login}">ログインへ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
