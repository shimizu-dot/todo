<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{todo.calendar.title}">ToDoカレンダー</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/main.min.css" rel="stylesheet">
    <style>
        #todoCalendar {
            background: #fff;
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div id="calendarI18n"
         th:attr="data-locale=${#locale.language},
                  data-btn-today=#{todo.calendar.button.today},
                  data-btn-month=#{todo.calendar.button.month},
                  data-btn-week=#{todo.calendar.button.week},
                  data-btn-list=#{todo.calendar.button.list}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0" th:text="#{todo.calendar.heading}">ToDoカレンダー</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/todo}" class="btn btn-outline-secondary" th:text="#{common.back}">戻る</a>
            <a th:href="@{/todo/new}" class="btn btn-primary" th:text="#{todo.list.new}">新規作成</a>
        </div>
    </div>

    <div class="d-flex flex-wrap gap-3 mb-3 small">
        <span><span class="badge text-bg-primary me-1">&nbsp;</span><span th:text="#{todo.calendar.legend.open}">未完了</span></span>
        <span><span class="badge text-bg-success me-1">&nbsp;</span><span th:text="#{todo.calendar.legend.completed}">完了</span></span>
        <span><span class="badge text-bg-danger me-1">&nbsp;</span><span th:text="#{todo.calendar.legend.overdue}">期限切れ</span></span>
    </div>

    <div id="todoCalendar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/locales-all.global.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const calendarEl = document.getElementById("todoCalendar");
        const i18n = document.getElementById("calendarI18n");
        const locale = i18n?.dataset?.locale || "ja";

        const calendar = new FullCalendar.Calendar(calendarEl, {
            locale: locale,
            initialView: "dayGridMonth",
            height: "auto",
            navLinks: true,
            dayMaxEvents: true,
            headerToolbar: {
                left: "prev,next today",
                center: "title",
                right: "dayGridMonth,timeGridWeek,listWeek"
            },
            buttonText: {
                today: i18n?.dataset?.btnToday || "Today",
                month: i18n?.dataset?.btnMonth || "Month",
                week: i18n?.dataset?.btnWeek || "Week",
                list: i18n?.dataset?.btnList || "List"
            },
            events: "/api/todo/events",
            dateClick: function (info) {
                window.location.href = "/todo/new?deadline=" + encodeURIComponent(info.dateStr);
            },
            eventClick: function (info) {
                if (info.event.url) {
                    info.jsEvent.preventDefault();
                    window.location.href = info.event.url;
                }
            }
        });

        calendar.render();
    });
</script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
