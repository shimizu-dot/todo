<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title>登録内容の確認</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="h4 mb-4">登録内容の確認</h1>

            <form th:action="@{/todo/complete}" method="post">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h2 class="h6 text-muted mb-3">入力内容</h2>

                        <div class="mb-3">
                            <label for="author" class="form-label">作成者</label>
                            <input id="author" type="text" class="form-control" th:value="${author}" readonly>
                            <input type="hidden" name="author" th:value="${author}">
                        </div>

                        <div class="mb-3">
                            <label for="title" class="form-label">タイトル</label>
                            <input id="title" type="text" class="form-control" th:value="${title}" readonly>
                            <input type="hidden" name="title" th:value="${title}">
                        </div>

                        <div class="mb-0">
                            <label for="detail" class="form-label">詳細</label>
                            <textarea id="detail" class="form-control" rows="4" th:text="${detail}" readonly></textarea>
                        </div>

                        <div class="mt-3 mb-0">
                            <label for="priority" class="form-label">優先度</label>
                            <input id="priority" type="text" class="form-control" th:value="${priority.label}" readonly>
                            <input type="hidden" name="priority" th:value="${priority}">
                        </div>

                        <div class="mt-3 mb-0">
                            <label for="category" class="form-label">カテゴリ</label>
                            <input id="category" type="text" class="form-control" th:value="${category != null ? category.name : ''}" readonly>
                            <input type="hidden" name="categoryId" th:value="${category != null ? category.id : ''}">
                        </div>

                        <div class="mt-3 mb-0">
                            <label for="deadline" class="form-label">期限日</label>
                            <input id="deadline" type="date" class="form-control" th:value="${deadline}" readonly>
                            <input type="hidden" name="deadline" th:value="${deadline}">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">戻る</a>
                    <button type="submit" class="btn btn-primary">登録</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
