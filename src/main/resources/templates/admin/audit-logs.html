<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{admin.audit.title}">監査ログ</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0" th:text="#{admin.audit.title}">監査ログ</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/users}" class="btn btn-outline-secondary" th:text="#{admin.users.title}">ユーザー管理</a>
            <a th:href="@{/admin/weekly-reports}" class="btn btn-outline-secondary" th:text="#{admin.weeklyReports.title}">週次レポート</a>
            <a th:href="@{/todo}" class="btn btn-outline-secondary" th:text="#{common.backToTodoList}">ToDo一覧へ戻る</a>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/admin/audit-logs}" method="get" class="row g-2 align-items-end">
                <div class="col-12 col-md-3">
                    <label class="form-label" th:text="#{admin.audit.filter.action}">Action</label>
                    <input class="form-control" name="action" th:value="${action}">
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label" th:text="#{admin.audit.filter.entityType}">Entity Type</label>
                    <select class="form-select" name="entityType">
                        <option value="" th:text="#{common.all}">All</option>
                        <option value="TODO" th:selected="${entityType == 'TODO'}">TODO</option>
                        <option value="USER" th:selected="${entityType == 'USER'}">USER</option>
                        <option value="SYSTEM" th:selected="${entityType == 'SYSTEM'}">SYSTEM</option>
                    </select>
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label" th:text="#{admin.audit.filter.user}">User</label>
                    <select class="form-select" name="userId">
                        <option value="" th:text="#{common.all}">All</option>
                        <option th:each="user : ${users}"
                                th:value="${user.id}"
                                th:text="${user.username}"
                                th:selected="${userId != null and user.id == userId}">admin</option>
                    </select>
                </div>
                <div class="col-12 col-md-2">
                    <label class="form-label" th:text="#{admin.audit.filter.ipAddress}">IP Address</label>
                    <input class="form-control" name="ipAddress" th:value="${ipAddress}">
                </div>
                <div class="col-12 col-md-3 d-flex gap-2">
                    <button class="btn btn-primary flex-fill" type="submit" th:text="#{common.search}">検索</button>
                    <a class="btn btn-outline-secondary flex-fill" th:href="@{/admin/audit-logs}" th:text="#{common.clear}">クリア</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle small mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th th:text="#{common.id}">ID</th>
                        <th th:text="#{admin.audit.table.datetime}">日時</th>
                        <th th:text="#{admin.audit.table.action}">Action</th>
                        <th th:text="#{admin.audit.table.entity}">Entity</th>
                        <th th:text="#{admin.audit.table.userId}">UserId</th>
                        <th th:text="#{admin.audit.table.status}">Status</th>
                        <th th:text="#{admin.audit.table.ip}">IP</th>
                        <th th:text="#{admin.audit.table.oldValue}">Old Value(JSON)</th>
                        <th th:text="#{admin.audit.table.newValue}">New Value(JSON)</th>
                        <th th:text="#{admin.audit.table.message}">Message</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="10" class="text-center text-muted" th:text="#{admin.audit.empty}">監査ログはありません</td>
                    </tr>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.id}">1</td>
                        <td th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-04-28 12:00:00</td>
                        <td th:text="${log.action}">TODO_UPDATE</td>
                        <td th:text="${log.entityType + '(' + (log.entityId == null ? '-' : log.entityId) + ')'}">TODO(1)</td>
                        <td th:text="${log.userId == null ? '-' : log.userId}">1</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${log.status == 'SUCCESS'} ? ' text-bg-success' : ' text-bg-danger'"
                                  th:text="${log.status}">SUCCESS</span>
                        </td>
                        <td th:text="${log.ipAddress == null ? '-' : log.ipAddress}">127.0.0.1</td>
                        <td style="max-width: 280px;">
                            <pre class="mb-0 text-break" th:text="${log.oldValue == null ? '-' : log.oldValue}">-</pre>
                        </td>
                        <td style="max-width: 280px;">
                            <pre class="mb-0 text-break" th:text="${log.newValue == null ? '-' : log.newValue}">-</pre>
                        </td>
                        <td th:text="${log.message == null ? '-' : log.message}">OK</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
