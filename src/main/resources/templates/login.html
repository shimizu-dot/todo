<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{login.title}">ログイン</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div class="text-end mb-2">
                        <a th:href="@{/login(lang='ja')}" class="small me-2">日本語</a>
                        <a th:href="@{/login(lang='en')}" class="small">English</a>
                    </div>
                    <h1 class="h4 mb-4 text-center" th:text="#{login.heading}">ToDo ログイン</h1>

                    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                        <span th:text="#{login.error}">ユーザー名またはパスワードが正しくありません。</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                        <span th:text="#{login.logout}">ログアウトしました。</span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{login.username}">ユーザー名</label>
                            <input id="username" name="username" type="text" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label" th:text="#{login.password}">パスワード</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{login.submit}">ログイン</button>
                    </form>

                    <p class="text-muted small mt-3 mb-0" th:text="#{login.initial.users}">
                        初期ユーザー: admin / password（ADMIN）, user / password（USER）
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
