<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var s=localStorage.getItem("theme");var d=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));}catch(e){}})();</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <title th:text="#{error.title}">エラー</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="text-end mb-2">
                        <a th:href="@{/todo(lang='ja')}" class="small me-2" th:text="#{lang.ja}">日本語</a>
                        <a th:href="@{/todo(lang='en')}" class="small" th:text="#{lang.en}">English</a>
                    </div>
                    <h1 class="h4 mb-3" th:text="#{error.heading}">エラーが発生しました</h1>
                    <p class="text-muted mb-4" th:text="#{error.description}">処理を完了できませんでした。内容をご確認ください。</p>

                    <dl class="row mb-4">
                        <dt class="col-sm-4" th:text="#{error.status}">ステータス</dt>
                        <dd class="col-sm-8"><span th:text="${status}">500</span> <span th:text="${error}">Internal Server Error</span></dd>

                        <dt class="col-sm-4" th:text="#{error.message}">メッセージ</dt>
                        <dd class="col-sm-8" th:text="${message}">予期しないエラーが発生しました</dd>

                        <dt class="col-sm-4" th:text="#{error.path}">パス</dt>
                        <dd class="col-sm-8" th:text="${path}">/todo</dd>
                    </dl>

                    <div class="d-flex gap-2">
                        <a th:href="@{/todo}" class="btn btn-primary" th:text="#{error.back.todo}">ToDo一覧へ戻る</a>
                        <a th:href="@{/login}" class="btn btn-outline-secondary" th:text="#{error.back.login}">ログインへ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
