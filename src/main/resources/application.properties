spring.application.name=todo

# H2 Database
spring.datasource.url=jdbc:h2:mem:tododb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run schema.sql at startup
spring.sql.init.mode=always

# MyBatis
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Multipart settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File storage
app.file-storage.location=uploads
app.persistence.users-file=data/users.json
app.persistence.label-colors-file=data/label-colors.json
app.persistence.label-colors-dir=data/label-colors

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application mail settings
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@example.com}
app.mail.default-to=${APP_MAIL_DEFAULT_TO:}
app.mail.reminder.to=${APP_MAIL_REMINDER_TO:}
app.mail.reminder.cron=${APP_MAIL_REMINDER_CRON:0 0 9 * * *}
app.mail.reminder.zone=${APP_MAIL_REMINDER_ZONE:Asia/Tokyo}
